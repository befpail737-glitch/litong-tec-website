<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="copperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b87333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5a2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blackPlastic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- IGBT Module Body -->
  <rect x="80" y="60" width="240" height="180" rx="8" fill="url(#metalGradient)" stroke="#666" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Mounting Holes -->
  <circle cx="100" cy="80" r="6" fill="#333"/>
  <circle cx="300" cy="80" r="6" fill="#333"/>
  <circle cx="100" cy="220" r="6" fill="#333"/>
  <circle cx="300" cy="220" r="6" fill="#333"/>
  
  <!-- Main Terminals -->
  <rect x="70" y="110" width="30" height="80" rx="3" fill="url(#copperGradient)" stroke="#8b5a2b" stroke-width="1"/>
  <rect x="300" y="110" width="30" height="80" rx="3" fill="url(#copperGradient)" stroke="#8b5a2b" stroke-width="1"/>
  
  <!-- Terminal Labels -->
  <text x="85" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">C</text>
  <text x="315" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">E</text>
  
  <!-- Gate Terminal -->
  <rect x="185" y="50" width="30" height="20" rx="2" fill="url(#copperGradient)" stroke="#8b5a2b" stroke-width="1"/>
  <text x="200" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">G</text>
  
  <!-- Center Label Area -->
  <rect x="120" y="100" width="160" height="100" rx="5" fill="url(#blackPlastic)" stroke="#444" stroke-width="1"/>
  
  <!-- Product Label -->
  <text x="200" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">CRRC</text>
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="14" fill="#ccc" text-anchor="middle">TIM1200FSM33</text>
  <text x="200" y="175" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle">1200V / 1200A</text>
  <text x="200" y="190" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">IGBT Module</text>
  
  <!-- Specification Badge -->
  <rect x="130" y="210" width="140" height="25" rx="3" fill="#0066cc"/>
  <text x="200" y="227" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">High Power IGBT</text>
  
  <!-- Side View Indicators -->
  <line x1="340" y1="100" x2="380" y2="100" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="340" y1="200" x2="380" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="385" y="105" font-family="Arial, sans-serif" font-size="10" fill="#666">34mm</text>
  <text x="385" y="205" font-family="Arial, sans-serif" font-size="10" fill="#666">Package</text>
  
  <!-- Corner Decorations -->
  <rect x="85" y="65" width="8" height="8" fill="#0066cc"/>
  <rect x="307" y="65" width="8" height="8" fill="#0066cc"/>
  <rect x="85" y="227" width="8" height="8" fill="#0066cc"/>
  <rect x="307" y="227" width="8" height="8" fill="#0066cc"/>
</svg>