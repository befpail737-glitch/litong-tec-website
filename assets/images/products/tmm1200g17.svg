<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="copperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b87333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5a2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a252f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1219;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sicGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#0099cc;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:0.3" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f4f8"/>
  
  <!-- SiC Module Body -->
  <rect x="80" y="60" width="240" height="180" rx="8" fill="url(#metalGradient)" stroke="#555" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- SiC Glow Effect -->
  <rect x="85" y="65" width="230" height="170" rx="6" fill="url(#sicGlow)"/>
  
  <!-- Mounting Holes -->
  <circle cx="100" cy="80" r="6" fill="#2c3e50"/>
  <circle cx="300" cy="80" r="6" fill="#2c3e50"/>
  <circle cx="100" cy="220" r="6" fill="#2c3e50"/>
  <circle cx="300" cy="220" r="6" fill="#2c3e50"/>
  
  <!-- Main Terminals -->
  <rect x="70" y="110" width="30" height="80" rx="3" fill="url(#copperGradient)" stroke="#8b5a2b" stroke-width="1"/>
  <rect x="300" y="110" width="30" height="80" rx="3" fill="url(#copperGradient)" stroke="#8b5a2b" stroke-width="1"/>
  
  <!-- Terminal Labels -->
  <text x="85" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">D</text>
  <text x="315" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">S</text>
  
  <!-- Gate Terminal -->
  <rect x="185" y="50" width="30" height="20" rx="2" fill="url(#copperGradient)" stroke="#8b5a2b" stroke-width="1"/>
  <text x="200" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">G</text>
  
  <!-- Center Label Area -->
  <rect x="120" y="100" width="160" height="100" rx="5" fill="url(#darkGradient)" stroke="#34495e" stroke-width="1"/>
  
  <!-- SiC Badge -->
  <rect x="130" y="105" width="40" height="18" rx="3" fill="#00d4ff" filter="url(#glow)"/>
  <text x="150" y="118" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">SiC</text>
  
  <!-- Product Label -->
  <text x="200" y="135" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">CRRC</text>
  <text x="200" y="158" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle">TMM1200G17</text>
  <text x="200" y="178" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">1700V / 1200A</text>
  <text x="200" y="192" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">SiC MOSFET Module</text>
  
  <!-- Performance Badge -->
  <rect x="130" y="210" width="140" height="25" rx="3" fill="#27ae60"/>
  <text x="200" y="227" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">60% Lower Loss</text>
  
  <!-- SiC Crystal Pattern -->
  <g opacity="0.1">
    <polygon points="350,50 360,70 340,70" fill="#00d4ff"/>
    <polygon points="370,60 380,80 360,80" fill="#00d4ff"/>
    <polygon points="340,80 350,100 330,100" fill="#00d4ff"/>
  </g>
  
  <!-- Side View Indicators -->
  <line x1="340" y1="100" x2="380" y2="100" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="340" y1="200" x2="380" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="385" y="105" font-family="Arial, sans-serif" font-size="10" fill="#666">34mm</text>
  <text x="385" y="205" font-family="Arial, sans-serif" font-size="10" fill="#666">Package</text>
  
  <!-- Corner Decorations -->
  <rect x="85" y="65" width="8" height="8" fill="#00d4ff"/>
  <rect x="307" y="65" width="8" height="8" fill="#00d4ff"/>
  <rect x="85" y="227" width="8" height="8" fill="#00d4ff"/>
  <rect x="307" y="227" width="8" height="8" fill="#00d4ff"/>
  
  <!-- Efficiency Indicator -->
  <rect x="20" y="120" width="40" height="60" rx="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <rect x="25" y="170" width="30" height="5" fill="#e74c3c"/>
  <rect x="25" y="160" width="30" height="5" fill="#e67e22"/>
  <rect x="25" y="150" width="30" height="5" fill="#f1c40f"/>
  <rect x="25" y="140" width="30" height="5" fill="#2ecc71"/>
  <rect x="25" y="130" width="30" height="5" fill="#27ae60"/>
  <text x="40" y="190" font-family="Arial, sans-serif" font-size="8" fill="#666" text-anchor="middle">Efficiency</text>
</svg>